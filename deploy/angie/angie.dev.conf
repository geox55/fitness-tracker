# Dev-конфиг Angie. TLS не нужен — фронт работает напрямую через
# `flutter run -d chrome`, а API дёргает http://localhost:8080/api/v1.
# ACME не активирован — нет смысла бесконечно стучаться в LE с localhost.

events {}

http {
    upstream api {
        server api:8000;
    }

    server {
        listen 80;
        server_name _;

        # CORS preflight отдаёт FastAPI; Angie просто проксирует.
        location /api/ {
            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        location = / {
            return 200 'Фитнес-трекер API (dev, Angie)\n';
            add_header Content-Type text/plain;
        }
    }
}
