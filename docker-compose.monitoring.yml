# Мониторинг (Prometheus + Grafana + экспортёры).
# Поднимается отдельно от основного стека, но в той же docker-сети.
#
#   docker compose -f docker-compose.monitoring.yml --env-file .env.prod up -d
#
# Требуется уже запущенный прод-стек (сеть fitness-tracker_internal).
# В .env.prod должны быть POSTGRES_* и GF_SECURITY_ADMIN_PASSWORD.

name: fitness-tracker-monitoring

x-logging: &monitoring-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  # Минимальный Loki: дашборд 16110 при импорте требует datasource типа Loki;
  # без контейнера Grafana не даёт нажать Import. Логи API сюда не собираются.
  loki:
    image: grafana/loki:2.9.8
    command: -config.file=/etc/loki/local-config.yaml
    networks: [app_internal]
    restart: unless-stopped
    logging: *monitoring-logging

  prometheus:
    image: prom/prometheus:v2.55.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --web.enable-lifecycle
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks: [app_internal]
    restart: unless-stopped
    logging: *monitoring-logging

  grafana:
    image: grafana/grafana:11.4.0
    depends_on:
      loki:
        condition: service_started
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:?set GF_SECURITY_ADMIN_PASSWORD in .env.prod}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-https://logs.portal.geox55.ru}
      GF_INSTALL_PLUGINS: ""
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    networks: [app_internal]
    restart: unless-stopped
    logging: *monitoring-logging

  node_exporter:
    image: prom/node-exporter:v1.9.0
    command:
      - --path.rootfs=/host
    pid: host
    volumes:
      - /:/host:ro
    networks: [app_internal]
    restart: unless-stopped
    logging: *monitoring-logging

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    privileged: true
    devices:
      - /dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    networks: [app_internal]
    restart: unless-stopped
    logging: *monitoring-logging

  postgres_exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:v0.17.1
    environment:
      # Пароль из .env.prod не должен содержать raw `@ : / ? #` без URL-encoding.
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable"
    networks: [app_internal]
    restart: unless-stopped
    logging: *monitoring-logging

volumes:
  prometheus_data:
  grafana_data:

networks:
  app_internal:
    name: fitness-tracker_internal
    external: true
