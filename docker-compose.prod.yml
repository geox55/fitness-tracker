name: fitness-tracker

# Production-стек. Запускается явным образом:
#   docker compose -f docker-compose.prod.yml --env-file .env.prod <command>
# (или через deploy/scripts/deploy.sh).
#
# Отличия от dev-docker-compose.yml:
#   - нет mailpit (для прод SMTP подключается через переменные окружения,
#     а в текущем .env.prod email_verification_required=False — реальная
#     отправка не нужна, см. specs/001);
#   - postgres / minio / api не выставляют порты наружу — доступ только
#     по внутренней docker-сети;
#   - angie собирается из своего Dockerfile.prod, открывает 80 и 443;
#     TLS-сертификат выпускает и обновляет встроенный ACME-модуль Angie
#     (см. deploy/angie/angie.prod.conf), состояние клиента живёт в
#     named volume angie_acme — никакого host-certbot/cron/systemd-таймера;
#   - PWA-bundle собирается на dev-машине (make build-pwa), на сервер
#     попадает через rsync; angie читает его bind-mount'ом из
#     ./pwa/build/web — Flutter SDK на проде не нужен;
#   - у долгоживущих сервисов включена ротация json-file-логов, чтобы
#     /var/lib/docker не вырос за месяц.

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

# ВАЖНО: значения обёрнуты в YAML-строки "${...}" — без этого YAML
# интерпретирует подставленный JSON (например `["https://..."]` в CORS_ORIGINS)
# как flow-sequence и режет внутренние кавычки. Pydantic тогда не парсит cors.
x-api-env: &api_env
  DATABASE_URL: "${DATABASE_URL}"
  JWT_SECRET: "${JWT_SECRET}"
  ENV: "${ENV:-production}"
  SMTP_HOST: "${SMTP_HOST:-}"
  SMTP_PORT: "${SMTP_PORT:-587}"
  SMTP_USERNAME: "${SMTP_USERNAME:-}"
  SMTP_PASSWORD: "${SMTP_PASSWORD:-}"
  SMTP_USE_TLS: "${SMTP_USE_TLS:-false}"
  SMTP_STARTTLS: "${SMTP_STARTTLS:-true}"
  EMAIL_FROM: "${EMAIL_FROM:-noreply@fitness-tracker.geox55.ru}"
  APP_BASE_URL: "${APP_BASE_URL}"
  S3_ENDPOINT: "${S3_ENDPOINT}"
  S3_PUBLIC_BASE_URL: "${S3_PUBLIC_BASE_URL}"
  S3_ACCESS_KEY: "${S3_ACCESS_KEY}"
  S3_SECRET_KEY: "${S3_SECRET_KEY}"
  S3_BUCKET: "${S3_BUCKET:-fitness-uploads}"
  S3_REGION: "${S3_REGION:-us-east-1}"
  CORS_ORIGINS: "${CORS_ORIGINS}"
  EMAIL_VERIFICATION_REQUIRED: "${EMAIL_VERIFICATION_REQUIRED:-false}"
  PDF_CLEANUP_INTERVAL_SECONDS: "${PDF_CLEANUP_INTERVAL_SECONDS:-3600}"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./deploy/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [internal]
    restart: unless-stopped
    logging: *default-logging

  # Один общий image для api / api-migrate / api-cleanup — содержимое
  # идентично, отличаются только command:. Это образ собирается локально
  # на dev-машине через `make build-api` (docker save | ssh | docker load)
  # или, если кто-то запустит `deploy.sh` напрямую на сервере без
  # --skip-build-api, через `compose build api`.
  api:
    image: fitness-tracker-api:latest
    build:
      context: .
      dockerfile: deploy/api/Dockerfile
    environment:
      <<: *api_env
    depends_on:
      postgres:
        condition: service_healthy
      api-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health').read()"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s
    networks: [internal]
    restart: unless-stopped
    logging: *default-logging

  api-migrate:
    image: fitness-tracker-api:latest
    environment:
      <<: *api_env
    command: ["alembic", "upgrade", "head"]
    depends_on:
      postgres:
        condition: service_healthy
    networks: [internal]
    restart: "no"
    logging: *default-logging

  api-cleanup:
    image: fitness-tracker-api:latest
    environment:
      <<: *api_env
    command:
      - /bin/sh
      - -c
      - |
        echo "[api-cleanup] starting; interval=$${PDF_CLEANUP_INTERVAL_SECONDS:-3600}s"
        while true; do
          python -m app.scripts.inbody_pdf_cleanup || \
            echo "[api-cleanup] run failed at $$(date -Is); will retry next cycle"
          sleep "$${PDF_CLEANUP_INTERVAL_SECONDS:-3600}"
        done
    depends_on:
      postgres:
        condition: service_healthy
      api-migrate:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
    networks: [internal]
    restart: unless-stopped
    logging: *default-logging

  # PWA-bundle собирается ЛОКАЛЬНО (см. `make build-pwa`), на сервер
  # доставляется через rsync вместе с остальным кодом. angie читает его
  # bind-mount'ом — это позволяет не таскать Flutter SDK (~2.5 ГБ) на прод.
  #
  # TLS — встроенный ACME-клиент Angie ходит в Let's Encrypt по HTTP-01
  # на :80 и кладёт серт в /var/lib/angie/acme/letsencrypt/. Состояние
  # (account.key + certificate.pem) персистится через named volume
  # angie_acme, чтобы переживать docker compose down/up без повторного
  # запроса в LE (rate limit 5/неделю на домен).
  angie:
    build:
      context: .
      dockerfile: deploy/angie/Dockerfile.prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./pwa/build/web:/usr/share/angie/html:ro
      - angie_acme:/var/lib/angie/acme
    depends_on:
      api:
        condition: service_healthy
    networks: [internal]
    restart: unless-stopped
    logging: *default-logging

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks: [internal]
    restart: unless-stopped
    logging: *default-logging

  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - |
        mc alias set local http://minio:9000 ${S3_ACCESS_KEY} ${S3_SECRET_KEY};
        mc mb --ignore-existing local/${S3_BUCKET:-fitness-uploads};
        mc anonymous set none local/${S3_BUCKET:-fitness-uploads};
    networks: [internal]
    restart: "no"
    logging: *default-logging

volumes:
  pgdata:
  miniodata:
  # Состояние ACME-клиента Angie: account.key (приватный ключ аккаунта
  # Let's Encrypt) + certificate.pem + private.key (CSR-ключ). Терять
  # volume — значит регистрировать новый LE-аккаунт и перезапрашивать
  # сертификат: rate limit 5 запросов на домен в неделю, в проде это
  # ничему не мешает, но без нужды трогать не стоит.
  angie_acme:

networks:
  internal:
    driver: bridge
