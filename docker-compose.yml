name: fitness-tracker

x-api-env: &api_env
  DATABASE_URL: ${DATABASE_URL}
  JWT_SECRET: ${JWT_SECRET}
  ENV: ${ENV}
  SMTP_HOST: ${SMTP_HOST:-mailpit}
  SMTP_PORT: ${SMTP_PORT:-1025}
  SMTP_USERNAME: ${SMTP_USERNAME:-}
  SMTP_PASSWORD: ${SMTP_PASSWORD:-}
  SMTP_USE_TLS: ${SMTP_USE_TLS:-false}
  SMTP_STARTTLS: ${SMTP_STARTTLS:-false}
  EMAIL_FROM: ${EMAIL_FROM:-noreply@fitness-tracker.local}
  APP_BASE_URL: ${APP_BASE_URL:-http://localhost:8080}
  S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
  S3_PUBLIC_BASE_URL: ${S3_PUBLIC_BASE_URL:-http://localhost:9000}
  S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minio}
  S3_SECRET_KEY: ${S3_SECRET_KEY:-minio12345}
  S3_BUCKET: ${S3_BUCKET:-fitness-uploads}
  S3_REGION: ${S3_REGION:-us-east-1}
  # Период между запусками pdf-cleanup'а (REQ-08 spec 013). По умолчанию
  # 1 час; для тестов можно поставить меньше через переменную окружения.
  PDF_CLEANUP_INTERVAL_SECONDS: ${PDF_CLEANUP_INTERVAL_SECONDS:-3600}

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./deploy/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [internal]
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: deploy/api/Dockerfile
    environment:
      <<: *api_env
    depends_on:
      postgres:
        condition: service_healthy
      # Без этого api поднимался раньше, чем alembic применил миграции,
      # и первые секунды отдавал 500 на запросах к ещё не созданным таблицам.
      api-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health').read()"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s
    networks: [internal]
    restart: unless-stopped

  api-migrate:
    build:
      context: .
      dockerfile: deploy/api/Dockerfile
    environment:
      <<: *api_env
    command: ["alembic", "upgrade", "head"]
    depends_on:
      postgres:
        condition: service_healthy
    networks: [internal]
    restart: "no"

  # Периодическая очистка просроченных pdf_import_jobs (REQ-08 spec 013).
  # Тот же образ, что api: запускаем в while-loop, чтобы не тащить cron/ofelia
  # и не давать docker.sock наружу. Период — 1 час по умолчанию (см.
  # PDF_CLEANUP_INTERVAL_SECONDS в x-api-env). Если cleanup-скрипт упал
  # (например, БД недоступна) — restart: unless-stopped поднимет контейнер
  # и цикл начнётся заново.
  api-cleanup:
    build:
      context: .
      dockerfile: deploy/api/Dockerfile
    environment:
      <<: *api_env
    command:
      - /bin/sh
      - -c
      - |
        echo "[api-cleanup] starting; interval=$${PDF_CLEANUP_INTERVAL_SECONDS:-3600}s"
        while true; do
          python -m app.scripts.inbody_pdf_cleanup || \
            echo "[api-cleanup] run failed at $$(date -Is); will retry next cycle"
          sleep "$${PDF_CLEANUP_INTERVAL_SECONDS:-3600}"
        done
    depends_on:
      postgres:
        condition: service_healthy
      api-migrate:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
    networks: [internal]
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api:
        condition: service_healthy
    networks: [internal]
    restart: unless-stopped

  # S3-совместимый storage для аплоадов (фото профиля, оригиналы PDF).
  # Веб-консоль на http://localhost:9001. В production swap на AWS S3 / R2 /
  # Selectel — наш код через boto3 одинаково работает с любым endpoint.
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minio}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minio12345}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks: [internal]
    restart: unless-stopped

  # One-shot job: создать бакет fitness-uploads после старта minio.
  # Bucket приватный — доступ к объектам только через signed URLs
  # (NFR-04 spec 013). На повторный старт `anonymous set none`
  # идемпотентен (приводит к "no policy", даже если уже выставлено).
  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - |
        mc alias set local http://minio:9000 ${S3_ACCESS_KEY:-minio} ${S3_SECRET_KEY:-minio12345};
        mc mb --ignore-existing local/${S3_BUCKET:-fitness-uploads};
        mc anonymous set none local/${S3_BUCKET:-fitness-uploads};
    networks: [internal]
    restart: "no"

  # Dev SMTP-сервер: ловит исходящие письма, реально никуда не шлёт.
  # Веб-UI с inbox — http://localhost:8025. Для production заменяется на
  # реальный SMTP через переменные окружения SMTP_HOST/PORT/USERNAME/PASSWORD.
  mailpit:
    image: axllent/mailpit:v1.20
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # web UI
    environment:
      MP_MAX_MESSAGES: 5000
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8025/readyz"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks: [internal]
    restart: unless-stopped

volumes:
  pgdata:
  miniodata:

networks:
  internal:
    driver: bridge
