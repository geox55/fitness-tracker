name: fitness_tracker
description: "Фитнес-трекер"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Routing
  go_router: ^14.6.2

  # Networking
  dio: ^5.7.0

  # Charts
  fl_chart: ^0.69.2

  # Utilities
  intl: any
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.8
  image_picker: ^1.1.2
  file_picker: ^8.1.4

  # Открытие signed-URL в новой вкладке для экспортированных PDF
  # (spec 010 §3 Sc.5). PWA only, чего нам и достаточно.
  web: ^1.1.0

  # Persistence для auth-токенов: на web shared_preferences использует
  # localStorage, на мобильных — нативный KV-store. Refresh-токен хранить
  # в localStorage небезопасно с точки зрения XSS, но для PWA-MVP это
  # стандартное решение; в будущем — мигрировать на flutter_secure_storage
  # с web-fallback'ом на in-memory + httpOnly cookie от backend.
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # Codegen
  build_runner: ^2.4.13
  riverpod_generator: ^2.4.3
  custom_lint: ^0.7.6
  riverpod_lint: ^2.6.5

flutter:
  uses-material-design: true
  generate: true
