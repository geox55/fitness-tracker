# Production angie для fitness-tracker.geox55.ru.
#
# Что отдаём:
#   /                  — статика Flutter Web (bind-mount ./pwa/build/web),
#                        SPA-fallback на /index.html для роутера go_router.
#   /api/*             — проксируем на FastAPI api:8000.
#   /s3/*              — проксируем на MinIO minio:9000 (signed URLs).
#
# TLS терминируется здесь; внутри docker-сети всё по HTTP. Сертификат
# выпускает и обновляет встроенный ACME-модуль Angie — никакого
# certbot/cron/systemd-таймера, никаких bind-mount'ов /etc/letsencrypt.
# Состояние клиента (account.key + certificate.pem) живёт в named volume
# angie_acme:/var/lib/angie/acme — см. docker-compose.prod.yml.

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/angie/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;

    # InBody-PDF и фото профиля могут весить до ~10 MB; берём с запасом.
    client_max_body_size 20m;

    # Скрываем версию из заголовков и страниц ошибок.
    server_tokens off;

    # --- gzip ---------------------------------------------------------------
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_min_length   1024;
    gzip_comp_level   6;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml
        application/xml+rss
        application/wasm
        image/svg+xml
        font/ttf
        font/woff
        font/woff2;

    # Резолвер из docker-DNS (127.0.0.11). Используется и для proxy_pass
    # с переменной (ленивый DNS, чтобы Angie стартовал без api/minio),
    # и для acme_client — он обязательный, иначе HTTP-запросы к LE
    # не разрешатся.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # --- ACME-клиент ---------------------------------------------------------
    # Angie сам поднимет listener на :80 для HTTP-01 challenge, если ни один
    # server-блок его не обслуживает; у нас :80 занят catch-all'ом ниже,
    # поэтому Angie встроит обработку /.well-known/acme-challenge/* прозрачно
    # в наш server-блок (через внутренний механизм acme_http_port).
    acme_client letsencrypt https://acme-v02.api.letsencrypt.org/directory
        email=admin@geox55.ru
        renew_before_expiry=30d;

    # ------------------------------------------------------------------------
    # HTTP :80 — только редирект на HTTPS (и обслуживание ACME-challenge).
    # ВАЖНО: server_name НЕ должен быть `_`, если есть директива `acme`
    # внутри блока — иначе `_` попадёт в CSR и LE его отвергнет.
    # У нас отдельный catch-all без acme, поэтому всё чисто.
    # ------------------------------------------------------------------------
    server {
        listen      80 default_server;
        listen      [::]:80 default_server;
        server_name fitness-tracker.geox55.ru _;

        # Angie перехватит /.well-known/acme-challenge/* раньше этого
        # return — это поведение модуля, не нужно отдельной location.
        location / {
            return 301 https://fitness-tracker.geox55.ru$request_uri;
        }
    }

    # ------------------------------------------------------------------------
    # HTTPS :443 — основной сервер. Имя `letsencrypt` через директиву `acme`
    # говорит модулю собрать CSR для всех server_name этого блока.
    # ------------------------------------------------------------------------
    server {
        listen      443 ssl;
        listen      [::]:443 ssl;
        http2       on;
        server_name fitness-tracker.geox55.ru;

        acme        letsencrypt;
        ssl_certificate     $acme_cert_letsencrypt;
        ssl_certificate_key $acme_cert_key_letsencrypt;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # --- Security headers -------------------------------------------------
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        root /usr/share/angie/html;
        index index.html;

        # --- API --------------------------------------------------------------
        location /api/ {
            # Переменная в proxy_pass → ленивая DNS-резолюция (см. resolver выше).
            set $api_upstream "api:8000";
            proxy_pass http://$api_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header Connection "";
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
        }

        # --- MinIO (signed URLs) ----------------------------------------------
        # rewrite убирает префикс /s3, потому что с переменной в proxy_pass
        # Angie/nginx не делает автоматический strip (как при literal proxy_pass
        # с trailing slash). Подпись signed URL остаётся валидной — host не
        # входит в canonical request у AWS Sigv4 (см. _swap_host в storage.py).
        location /s3/ {
            set $s3_upstream "minio:9000";
            rewrite ^/s3/(.*)$ /$1 break;
            proxy_pass http://$s3_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header Connection "";

            # MinIO стримит файлы — буферизация только мешает.
            proxy_buffering off;
            proxy_request_buffering off;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # --- Кеш для иммутабельных ассетов (имена с хешами от Flutter) -------
        location ~* \.(?:js|css|wasm|woff2?|ttf|png|jpg|jpeg|gif|svg|ico)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
            add_header X-Content-Type-Options "nosniff" always;
            try_files $uri =404;
        }

        # --- Service Worker не кешируем (Flutter регулярно его обновляет) ----
        location = /flutter_service_worker.js {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            try_files $uri =404;
        }

        # --- SPA fallback на index.html ---------------------------------------
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
